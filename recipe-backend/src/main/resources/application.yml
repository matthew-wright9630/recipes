server:
  port: 8083

cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://52.21.113.119}"

spring:
  flyway:
    enabled: true
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/wright_kitchen}"
    username: "${DB_USER}"
    password: "${DB_PASS}"
    driver-class-name: org.postgresql.Driver

  web:
    resources:
      add-mappings: false
    mvc:
      throw-exception-if-no-handler-found: false

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: "${MAX_FILE_SIZE:25MB}"
      max-request-size: "${MAX_REQUEST_SIZE:25MB}"

  sql:
    init:
      mode: never

frontend:
  frontend_url: "${FRONTEND_URL:http://52.21.113.119}"

jwt:
  secret: "${JWT_SECRET}"
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    com.zaxxer.hikari: WARN
    org.springframework.jdbc.datasource: INFO
    root: INFO
    org.hibernate.SQL: INFO

aws:
  bucket: "${AWS_BUCKET}"
  region: "${AWS_REGION}"
