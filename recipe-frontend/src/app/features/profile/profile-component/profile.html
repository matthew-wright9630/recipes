<article>
  <div class="profile">
    <div class="profile__header"></div>
    <div class="profile__cookbooks"></div>
    <div class="profile__recipes">
      <p>Recent Recipes:</p>
      <div class="profile__recipes__grid">
        @for(recipe of recipeList(); track recipe.id) {
        <app-recipe [recipe]="recipe"></app-recipe>
        }
      </div>
    </div>
    <div class="profile__footer">
      <button class="profile__btn">My Recipes</button>
      <button class="profile__btn">Cookbooks</button>
      <button class="profile__btn">Settings</button>
    </div>
  </div>
</article>
