<mat-toolbar>
  <div class="logo-container">
    <div class="header__title" routerLink="/">The Wright Kitchen</div>
  </div>

  <span class="spacer"></span>

  <div class="header__buttons desktop-nav">
    @if(this.authState.currentUser()) {
    <button mat-raised-button class="header__btn" routerLink="/">
      Recipes
    </button>
    <button mat-raised-button class="header__btn" routerLink="/cookbooks">
      Cookbooks
    </button>
    <button mat-raised-button class="header__btn" routerLink="/recipes">
      My Recipes
    </button>
    <button mat-raised-button class="header__btn" routerLink="/profile">
      Profile
    </button>
    } @else {
    <button mat-raised-button class="header__btn" routerLink="/">
      Recipes
    </button>
    <button mat-raised-button class="header__btn" (click)="openLogin()">
      Login
    </button>
    <button mat-raised-button class="header__btn" (click)="openRegistration()">
      Register
    </button>
    }
  </div>

  @if(this.authState.currentUser()) {

  <button
    aria-label="Menu"
    mat-icon-button
    class="mobile-menu"
    [matMenuTriggerFor]="menu"
  >
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item routerLink="/">Recipes</button>
    <button mat-menu-item routerLink="/cookbooks">Cookbooks</button>
    <button mat-menu-item routerLink="/recipes">My Recipes</button>
    <button mat-menu-item routerLink="/profile">Profile</button>
  </mat-menu>
  } @else {

  <button mat-icon-button class="mobile-menu" [matMenuTriggerFor]="menu">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item routerLink="/">Recipes</button>
    <button mat-menu-item (click)="openLogin()">Login</button>
    <button mat-menu-item (click)="openRegistration()">Register</button>
  </mat-menu>
  }
</mat-toolbar>
