<mat-toolbar>
  <div class="logo-container">
    <img src="/favicon.io" alt="Logo" />
  </div>

  <span class="spacer"></span>

  <div class="header__buttons desktop-nav">
    <button mat-raised-button routerLink="/">Browse Recipes</button>
    <button mat-raised-button routerLink="/cookbooks">Cookbooks</button>
    <button mat-raised-button routerLink="/recipes">My Recipes</button>
    <button mat-raised-button routerLink="/profile">Profile</button>
  </div>

  <button mat-icon-button class="mobile-menu" [matMenuTriggerFor]="menu">
    <mat-icon>menu</mat-icon>
  </button>

  <mat-menu #menu="matMenu">
    <button mat-menu-item routerLink="/">Browse Recipes</button>
    <button mat-menu-item routerLink="/cookbooks">Cookbooks</button>
    <button mat-menu-item routerLink="/recipes">Recipes</button>
    <button mat-menu-item routerLink="/profile">Profile</button>
  </mat-menu>
</mat-toolbar>
