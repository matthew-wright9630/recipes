<section class="recipe-card">
  <mat-card align="center" (click)="openRecipe(recipe)">
    <mat-card-title class="recipe-card-title">{{ recipe.name }}</mat-card-title>
    <!-- <mat-card-content> -->
    <img
      mat-card-image
      [src]="recipe.imageUrl + '-thumb.jpg'"
      [alt]="recipe.name"
      class="recipe-card__img"
    />
    <!-- </mat-card-content> -->
  </mat-card>
</section>
